<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drum Machine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="flex align-center justify-center">
      <div
        id="drum-machine"
        class="grid mbl-8 pY-6"
        aria-label="BoomBox - Boite à rythmes"
      >
        <div class="left-container flex column align-center justify-around">
          <div class="head-container flex column mb-12">
            <h1 class="engraved">TRBox</h1>
            <button
              id="pushBtn"
              class="push is-off pX-4 pY-1 br-xs engraved"
              aria-pressed="false"
            >
              On
            </button>
          </div>

          <fieldset class="keyboard-switch-container flex mb-3">
            <legend class="engraved mb-1">Keyboard Layout</legend>
            <span class="engraved">QWERTY</span>
            <label class="switch">
              <input
                type="checkbox"
                id="keyboard-switch"
                aria-label="Basculer entre clavier QWERTY et AZERTY"
              />
              <span class="slider"></span>
            </label>
            <span class="engraved">AZERTY</span>
          </fieldset>
        </div>

        <div class="center-container flex column align-center justify-center">
          <div id="pad-bank" class="grid pY-4 pX-8 br-s">
            <button id="pad-Q" class="drum-pad" aria-label="Pad Q - Kick">
              <span class="pad-label">Q</span>
              <audio
                id="Q"
                class="clip"
                src="assets/samples/tr707/kick.wav"
              ></audio>
            </button>
            <button id="pad-W" class="drum-pad" aria-label="Pad W - Snare">
              <span class="pad-label">W</span>
              <audio
                id="W"
                class="clip"
                src="assets/samples/tr707/snare.wav"
              ></audio>
            </button>
            <button id="pad-E" class="drum-pad" aria-label="Pad E - Rimshot">
              <span class="pad-label">E</span>
              <audio
                id="E"
                class="clip"
                src="assets/samples/tr707/rimshot.wav"
              ></audio>
            </button>
            <button id="pad-A" class="drum-pad" aria-label="Pad A - Handclap">
              <span class="pad-label">A</span>
              <audio
                id="A"
                class="clip"
                src="assets/samples/tr707/handclap.wav"
              ></audio>
            </button>
            <button id="pad-S" class="drum-pad" aria-label="Pad S - Closed-HH">
              <span class="pad-label">S</span>
              <audio
                id="S"
                class="clip"
                src="assets/samples/tr707/closed-hh.wav"
              ></audio>
            </button>
            <button id="pad-D" class="drum-pad" aria-label="Pad D - Open-HH">
              <span class="pad-label">D</span>
              <audio
                id="D"
                class="clip"
                src="assets/samples/tr707/open-hh.wav"
              ></audio>
            </button>
            <button id="pad-Z" class="drum-pad" aria-label="Pad Z - Cowbell">
              <span class="pad-label">Z</span>
              <audio
                id="Z"
                class="clip"
                src="assets/samples/tr707/cowbell.wav"
              ></audio>
            </button>
            <button id="pad-X" class="drum-pad" aria-label="Pad X - Ride">
              <span class="pad-label">X</span>
              <audio
                id="X"
                class="clip"
                src="assets/samples/tr707/ride.wav"
              ></audio>
            </button>
            <button id="pad-C" class="drum-pad" aria-label="Pad C - Tambourin">
              <span class="pad-label">C</span>
              <audio
                id="C"
                class="clip"
                src="assets/samples/tr707/tambourin.wav"
              ></audio>
            </button>
          </div>
        </div>

        <div class="right-container flex align-center justify-center pX-8">
          <div class="controls-container flex column align-center">
            <h2 class="engraved mb-2">Controls</h2>
            <p
              id="display"
              class="flex align-center justify-center"
              role="status"
              aria-live="polite"
              aria-atomic="true"
            ></p>

            <fieldset class="kit-container flex pT-2">
              <legend class="engraved">Kit Selection</legend>

              <input type="radio" name="kits" id="TR-707" disabled />
              <label for="TR-707" class="pX-4 pY-1 is-off engraved"
                >TR-707</label
              >

              <input type="radio" name="kits" id="TR-808" disabled />
              <label for="TR-808" class="pX-4 pY-1 is-off engraved"
                >TR-808</label
              >

              <input type="radio" name="kits" id="TR-909" disabled />
              <label for="TR-909" class="pX-4 pY-1 is-off engraved"
                >TR-909</label
              >
            </fieldset>

            <div class="volume-slider">
              <label for="volume-control" class="engraved mb-1">Volume</label>
              <input
                type="range"
                id="volume-control"
                min="0"
                max="100"
                step="1"
                value="30"
                aria-label="Volume (0 à 100)"
              />
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
