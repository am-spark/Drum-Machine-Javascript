<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drum Machine</title>
    <link rel="stylesheet" href="styles.css">
  </head>

  <body>
    <main class="flex align-start justify-center pt-10wh">
      <div id="drum-machine" class="flex wrap p-4">
        <div class="left-container pX-8 pY-2">
          <h1>BoomBox</h1>
          <button id="toggleBtn" class="toggle is-on" aria-pressed="true">On</button>
        </div>
        <div class="center-container">
          <div id="pad-bank" class="grid p-4">
            <button id="" class="drum-pad">
              Q
              <audio id="Q" class="clip" src=""></audio>
            </button>
            <button id="" class="drum-pad">
              W
              <audio id="W" class="clip" src=""></audio>
            </button>
            <button id="" class="drum-pad">
              E
              <audio id="E" class="clip" src=""></audio>
            </button>
            <button id="" class="drum-pad">
              A
              <audio id="A" class="clip" src=""></audio>
            </button>
            <button id="" class="drum-pad">
              S
              <audio id="S" class="clip" src=""></audio>
            </button>
            <button id="" class="drum-pad">
              D
              <audio id="D" class="clip" src=""></audio>
            </button>
            <button id="" class="drum-pad">
              Z
              <audio id="Z" class="clip" src=""></audio>
            </button>
            <button id="" class="drum-pad">
              X
              <audio id="Z" class="clip" src=""></audio>
            </button>
            <button id="" class="drum-pad">
              C
              <audio id="C" class="clip" src=""></audio>
            </button>
          </div>
        </div>
        <div class="right-container flex column pY-4 pX-8">
          <p id="display"></p>

          <fieldset>
            <legend>Kit Selection</legend>

            <input type="radio" name="kits" id="TR-707">
            <label for="TR-707" class="pX-4 pY-1">TR-707</label>

            <input type="radio" name="kits" id="TR-808" checked>
            <label for="TR-808" class="pX-4 pY-1">TR-808</label>

            <input type="radio" name="kits" id="TR-909">
            <label for="TR-909" class="pX-4 pY-1">TR-909</label>
          </fieldset>

          <div class="volume-slider">
            <label for="volume-control">Volume</label>
            <input type="range" id="volume-control" min="0" max="1" step="0.01" value="0.3">
          </div>
        </div>


      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
